<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="utf-8">
    <style>
      ul {
        margin-left: 0px;
      }
    </style>
  </head>
  <body>
    <ul>
      
    </ul>
    <p></p>
    <script>
      const div = document.querySelector('ul');
async function getAdvice() {
  const promises = [];

  for (let i = 0; i < 10; i++) {
    promises.push(
      fetch(`https://api.adviceslip.com/advice?cb=${Date.now() + i}`)
        .then(res => res.json())
    );
  }

  try {
    const results = await Promise.all(promises);
    results.forEach(data => {
      const ele = document.createElement('li');
      ele.textContent = data.slip.advice;
      div.append(ele);
    });
  } catch (err) {
    console.error("Error:", err);
  }
}
getAdvice();
    </script>
  </body>
</html>
